<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <filter id="glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="1.6" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- navy circular base, matching the site's hero/template background -->
  <circle cx="32" cy="32" r="30" fill="#09296A"/>
  <circle cx="32" cy="32" r="29.25" fill="none" stroke="#38bdf8" stroke-opacity="0.55" stroke-width="1.5"/>

  <!-- glossy top sheen -->
  <path d="M6 22 C6 11 15 4 27 4 H37 C49 4 58 11 58 20 C40 28 18 28 6 22 Z" fill="#ffffff" fill-opacity="0.07"/>

  <!-- letter I, dot rendered as a glowing spark accent -->
  <rect x="27.5" y="24" width="9" height="26" rx="3" fill="#ffffff"/>
  <circle cx="32" cy="16" r="5" fill="#38bdf8" filter="url(#glow)"/>
</svg>
