<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="accent" x1="4" y1="4" x2="60" y2="60" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="sheen" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.55"/>
      <stop offset="0.6" stop-color="#ffffff" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="soften" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="2" stdDeviation="2.4" flood-color="#1e1b4b" flood-opacity="0.45"/>
    </filter>
    <filter id="glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="1.6" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- glass panel on gradient base (no dark backdrop) -->
  <g filter="url(#soften)">
    <rect x="3" y="3" width="58" height="58" rx="17" fill="url(#accent)"/>
    <rect x="3" y="3" width="58" height="58" rx="17" fill="#ffffff" fill-opacity="0.08"/>
    <rect x="3.75" y="3.75" width="56.5" height="56.5" rx="16.25" fill="none" stroke="#ffffff" stroke-opacity="0.45" stroke-width="1"/>
  </g>

  <!-- glossy top sheen -->
  <path d="M5 18 C5 9 11 4 21 4 H43 C53 4 59 9 59 16 C39 23 19 23 5 18 Z" fill="url(#sheen)"/>

  <!-- letter I, dot rendered as a glowing spark accent -->
  <rect x="27.5" y="24" width="9" height="26" rx="3" fill="#ffffff"/>
  <circle cx="32" cy="16" r="5" fill="#ffffff" filter="url(#glow)"/>
</svg>
